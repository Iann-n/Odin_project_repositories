<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar">
        <img src="img.jpg" class="side-pic" alt="cinematic nature sunset">
        <h1>ODIN</h1>
        <p class="img-p">photo by Alex Ivanov on pexels</p>
    </div>
    
    <div class="content">
        <div class="content-top">
            <div class="content-top-text">
                <p style="margin-bottom: 10px;">This is not a real online service! You know you need something like this in your life to help realize
                    your deepest dreams. Sign up now to get started.
                </p>

                <p>You know you want to</p>
            </div>
        </div>
        <div class="signup">
                <form>
                    <fieldset>
                        <legend>Let's do this!</legend>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="first-name">FIRST NAME</label>
                                <input id="first-name", type="text", required>
                            </div>

                            <div class="form-group">
                                <label for="last-name">LAST NAME</label>
                                <input id="last-name", type="text", required>
                            </div>
                        </div>

                        <div class="form-row">

                            <div class="form-group">
                                <label for="email">EMAIL</label>
                                <input id="email", type="email", name="email", required>
                            </div>

                            <div class="form-group">
                                <label for="phone-number">PHONE NUMBER</label>
                                <input id="phone-number", type="tel", name="phone-number", required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="password">PASSWORD</label>
                                <input id="password", type="password", required>
                            </div>

                            <div class="form-group">
                                <label for="confirm-password">CONFIRM PASSWORD</label>
                                <input id="confirm-password",type="password", required>
                            </div>
                        </div>
                    </fieldset>
                </form>
            </div>
            <div class="content-bottom">
                <button>Create Account</button>
                <p class="login">Already have an account? <a href="">Log in</a></p>
            </div>
    </div>
</body>
</html>
